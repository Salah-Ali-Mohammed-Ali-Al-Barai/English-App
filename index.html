<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق انجليش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            /* خلفية متدرجة ديناميكية */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1f1c2c, #928dab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        /* حركة الخلفية */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            max-width: 500px; 
            width: 100%;
            /* تأثير الزجاج الشفاف Glassmorphism */
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 50px 30px; 
            border-radius: 24px; 
            box-shadow: 0 25px 45px rgba(0,0,0,0.2); 
            text-align: center;
        }

        .app-icon { 
            width: 130px; 
            height: 130px; 
            border-radius: 30px; 
            margin-bottom: 25px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            /* تأثير الطفو */
            animation: float 4s ease-in-out infinite;
            background-color: white; /* في حال كانت الـ SVG شفافة */
            padding: 10px;
        }

        /* حركة طفو الأيقونة */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 { 
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 15px; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        p { 
            font-size: 18px; 
            line-height: 1.7; 
            margin-bottom: 40px; 
            color: #e0e0e0;
        }

        .download-btn { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            /* تدرج لوني فخم للزر */
            background: linear-gradient(135deg, #00b09b, #96c93d); 
            color: white; 
            padding: 16px 40px; 
            text-decoration: none; 
            font-size: 22px; 
            font-weight: 700;
            border-radius: 50px; 
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.3);
            transition: all 0.4s ease; 
        }

        .download-btn:hover { 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 15px 25px rgba(0, 176, 155, 0.5);
            background: linear-gradient(135deg, #96c93d, #00b09b); 
        }

        /* إضافة أيقونة تحميل صغيرة بجانب النص */
        .download-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="english_svg.svg" alt="أيقونة تطبيق انجليش" class="app-icon">
        
        <h1>تطبيق انجليش</h1>
        <p>بوابتك الأذكى والأسرع لإتقان اللغة الإنجليزية. ابدأ رحلة التعلم الممتعة وحمّل التطبيق الآن!</p>
        
        <a href="https://github.com/Salah-Ali-Mohammed-Ali-Al-Barai/English-App/releases/download/v1.0/english-app.apk" class="download-btn">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            تحميل التطبيق
        </a>
    </div>
</body>
</html>
